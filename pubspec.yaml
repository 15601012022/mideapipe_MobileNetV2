name: driver_drowsidetection
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.0
  file_picker: ^8.0.0
  shared_preferences: ^2.0.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.4
  cloud_firestore: ^5.4.4

  # Social Auth
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1

  # Camera & Permissions
  camera: ^0.11.0+2
  camera_windows: ^0.2.3
  camera_linux: ^0.0.8
  camera_macos: ^0.0.9
  permission_handler: ^11.3.1

  # TensorFlow Lite (compatible versions)
  tflite_flutter: ^0.12.1




  # Image Processing
  image: ^4.1.7
  image_picker: ^1.0.4
  image_picker_ios: ^0.8.8

  # Networking
  http: ^1.2.2
  dio: ^5.7.0

  # Background Services
  flutter_background_service: ^5.0.10
  flutter_background_service_android: ^6.2.4

  # Bluetooth
  flutter_blue_plus: ^1.32.12

  # Utilities
  path_provider: ^2.1.4

  # Alerts
  audioplayers: ^6.1.0
  vibration: ^2.0.0
  url_launcher: ^6.3.1
  telephony_sms: ^0.0.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/welcome.jpg
    - assets/welcome.png
    - assets/sign.png
    - assets/alert_sound.mp3
    - assets/alarm_beep.mp3
    - assets/alarm_siren.mp3
    - assets/alarm_horn.mp3
    - assets/model/drowsiness_model_fp16.tflite
    - assets/face_landmarker.task

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_foreground: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"



flutter_native_splash:
  image: assets/logo.png
  color: "#FFFFFF"
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: scaleAspectFit
  # You can set image_size to adjust logo size.


  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
